services:
  app:
    build: .
    container_name: document-parser-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: document-parser-qdrant
    ports:
      - "6333:6333"
    volumes:
      - D:/qdrant/storage:/qdrant/storage
